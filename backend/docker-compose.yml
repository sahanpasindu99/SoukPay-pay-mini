version: '3.8'

services:
  db:
    image: postgres:15
    container_name: soukpay-db
    restart: always
    environment:
      POSTGRES_USER: soukpay
      POSTGRES_PASSWORD: soukpay123
      POSTGRES_DB: soukpay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: